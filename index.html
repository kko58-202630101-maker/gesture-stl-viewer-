<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hand Tracking STL Viewer</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam-container { position: absolute; top: 20px; left: 20px; width: 240px; height: 180px; border-radius: 10px; overflow: hidden; border: 2px solid #3b82f6; z-index: 10; transform: scaleX(-1); }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #ui-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-align: center; }
        .file-upload-btn { background: #3b82f6; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block; }
        #file-input { display: none; }
        #status { margin-top: 10px; font-size: 14px; color: #cbd5e1; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/STLLoader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="webcam-container"><video id="webcam" autoplay playsinline></video></div>
    <div id="ui-container">
        <label for="file-input" class="file-upload-btn">STL 파일 업로드</label>
        <input type="file" id="file-input" accept=".stl">
        <div id="status">시스템 준비 중... 웹캠 권한을 허용해 주세요.</div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const fileInput = document.getElementById('file-input');
        const statusElement = document.getElementById('status');
        
        let scene, camera, renderer, currentMesh;
        let prevHandX = null, prevHandY = null;
        let isPinching = false;

        function init3D() {
            try {
                const container = document.getElementById('canvas-container');
                scene = new window.THREE.Scene();
                scene.background = new window.THREE.Color(0x1a1a1a);

                camera = new window.THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 0, 150);

                renderer = new window.THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);

                scene.add(new window.THREE.AmbientLight(0x666666));
                const dirLight = new window.THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(1, 1, 1).normalize();
                scene.add(dirLight);

                const geometry = new window.THREE.BoxGeometry(30, 30, 30);
                const material = new window.THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4, metalness: 0.2 });
                currentMesh = new window.THREE.Mesh(geometry, material);
                scene.add(currentMesh);

                window.addEventListener('resize', onWindowResize);
                animate();
            } catch (e) {
                statusElement.innerText = "3D 엔진 로드 실패. 보안망 차단을 확인하세요.";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isPinching && currentMesh) { currentMesh.rotation.y += 0.005; }
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            statusElement.innerText = "STL 파일 분석 중...";
            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    const loader = new window.THREE.STLLoader();
                    const geometry = loader.parse(event.target.result);
                    if (currentMesh) scene.remove(currentMesh);
                    
                    const material = new window.THREE.MeshStandardMaterial({ color: 0x10b981, roughness: 0.4, metalness: 0.2 });
                    currentMesh = new window.THREE.Mesh(geometry, material);
                    
                    geometry.computeBoundingBox();
                    geometry.center();
                    
                    const size = new window.THREE.Vector3();
                    geometry.boundingBox.getSize(size);
                    camera.position.z = Math.max(size.x, size.y, size.z) * 2.5;

                    scene.add(currentMesh);
                    statusElement.innerText = file.name + " 로드 완료!";
                } catch (error) {
                    statusElement.innerText = "파일 분석 실패.";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const distance = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
                const wristX = landmarks[0].x;
                const wristY = landmarks[0].y;

                if (distance < 0.06) { 
                    isPinching = true;
                    statusElement.innerText = "도형 잡음 ✊ 손을 움직이세요.";
                    if (prevHandX !== null && prevHandY !== null) {
                        if (currentMesh) {
                            currentMesh.rotation.y -= (wristX - prevHandX) * 4; 
                            currentMesh.rotation.x += (wristY - prevHandY) * 4; 
                        }
                    }
                    prevHandX = wristX; prevHandY = wristY;
                } else {
                    isPinching = false;
                    statusElement.innerText = "🖐️ 손 인식 완료: 주먹을 쥐어보세요.";
                    prevHandX = null; prevHandY = null;
                }
            } else {
                isPinching = false;
                statusElement.innerText = "👋 카메라에 손을 보여주세요.";
                prevHandX = null; prevHandY = null;
            }
        }

        try {
            const hands = new window.Hands({ locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/hands/" + file });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(onHandResults);

            const cameraUtils = new window.Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            
            init3D();
            cameraUtils.start().then(() => { statusElement.innerText = "준비 완료! STL을 업로드하세요."; })
            .catch(err => { statusElement.innerText = "카메라 권한 거부됨. 주소창 왼쪽 자물쇠를 확인하세요."; });
        } catch(e) {
            statusElement.innerText = "인공지능 엔진 로드 실패. 네트워크 상태를 확인하세요.";
        }
    </script>
</body>
</html>
